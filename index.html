<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Pageant Scoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@400;500;600&amp;display=swap');
        
        :root {
            --tw-color-primary: #6f42c1;
        }
        
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Playfair Display', sans-serif;
        }
        
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
        }
        
        .score-input {
            appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 9999px;
            background: #334155;
        }
        
        .score-input::-webkit-slider-thumb {
            appearance: none;
            height: 18px;
            width: 18px;
            background: #6f42c1;
            border-radius: 9999px;
            cursor: pointer;
            box-shadow: 0 0 0 4px rgba(111, 66, 193, 0.3);
        }
        
        .tab-active {
            border-bottom: 3px solid #6f42c1;
            color: #6f42c1;
            font-weight: 600;
        }
        
        .leaderboard-row {
            transition: all 0.3s ease;
        }
        
        .leaderboard-row:hover {
            transform: scale(1.02);
            background-color: rgba(111, 66, 193, 0.1);
        }
        
        .crown {
            animation: crown-float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0f0a2a] via-[#1a1240] to-[#2a0f3d] text-white min-h-screen pb-12">
    <div class="max-w-7xl mx-auto px-6">
        
        <!-- HEADER -->
        <div class="flex items-center justify-between py-8 border-b border-white/10">
            <div class="flex items-center gap-x-4">
                <div class="w-14 h-14 bg-gradient-to-br from-[#6f42c1] to-[#c026d3] rounded-3xl flex items-center justify-center text-4xl shadow-lg shadow-purple-500/30 crown">👑</div>
                <div>
                    <h1 class="title-font text-5xl tracking-tighter">PAGEANT<span class="text-[#facc15]">SCORE</span></h1>
                    <p class="text-[#facc15] text-sm -mt-1 font-medium">Professional Scoring System</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-8 text-lg font-medium">
                <button onclick="switchTab(0)" id="tab-0" class="tab-button flex items-center gap-x-2 tab-active">
                    <i class="fa-solid fa-gauge-high"></i>
                    Dashboard
                </button>
                <button onclick="switchTab(1)" id="tab-1" class="tab-button flex items-center gap-x-2">
                    <i class="fa-solid fa-users"></i>
                    Contestants
                </button>
                <button onclick="switchTab(2)" id="tab-2" class="tab-button flex items-center gap-x-2">
                    <i class="fa-solid fa-gavel"></i>
                    Judges
                </button>
                <button onclick="switchTab(3)" id="tab-3" class="tab-button flex items-center gap-x-2">
                    <i class="fa-solid fa-list-check"></i>
                    Criteria
                </button>
                <button onclick="switchTab(4)" id="tab-4" class="tab-button flex items-center gap-x-2">
                    <i class="fa-solid fa-pen-to-square"></i>
                    Score Entry
                </button>
                <button onclick="switchTab(5)" id="tab-5" class="tab-button flex items-center gap-x-2">
                    <i class="fa-solid fa-trophy"></i>
                    Leaderboard
                </button>
            </div>
            
            <div class="flex items-center gap-x-4">
                <button onclick="loadSampleData()" 
                        class="flex items-center gap-x-2 bg-white/10 hover:bg-white/20 px-5 py-3 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-seedling"></i>
                    Load Sample
                </button>
                <button onclick="exportData()" 
                        class="flex items-center gap-x-2 bg-[#6f42c1] hover:bg-[#8e5cff] px-5 py-3 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-download"></i>
                    Export JSON
                </button>
                <button onclick="resetAllData()" 
                        class="flex items-center gap-x-2 bg-red-500/20 hover:bg-red-500/30 text-red-400 px-5 py-3 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-trash"></i>
                    Reset
                </button>
            </div>
        </div>

        <!-- TAB 0: DASHBOARD -->
        <div id="content-0" class="tab-content">
            <div class="mt-12 text-center">
                <h2 class="title-font text-6xl mb-3">Welcome to the Pageant</h2>
                <p class="text-[#facc15] text-2xl font-light">Real-time scoring • Multiple judges • Automatic rankings</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-16">
                <div class="glass border border-white/10 rounded-3xl p-8 text-center">
                    <div class="text-7xl mb-4">👥</div>
                    <div id="dash-contestants" class="text-7xl font-bold text-[#facc15]">4</div>
                    <p class="text-xl text-gray-400 mt-2">Contestants</p>
                </div>
                <div class="glass border border-white/10 rounded-3xl p-8 text-center">
                    <div class="text-7xl mb-4">⚖️</div>
                    <div id="dash-judges" class="text-7xl font-bold text-[#facc15]">3</div>
                    <p class="text-xl text-gray-400 mt-2">Judges</p>
                </div>
                <div class="glass border border-white/10 rounded-3xl p-8 text-center relative">
                    <div class="text-7xl mb-4">🏆</div>
                    <div id="dash-ranked" class="text-7xl font-bold text-[#facc15]">4</div>
                    <p class="text-xl text-gray-400 mt-2">Fully Ranked</p>
                    <div class="absolute -top-3 -right-3 bg-[#facc15] text-[#1e2937] text-xs font-bold px-4 py-1 rounded-3xl shadow-xl">LIVE</div>
                </div>
            </div>
            
            <div class="mt-16">
                <h3 class="text-2xl font-semibold mb-6 flex items-center gap-x-3"><i class="fa-solid fa-trophy"></i> Current Top 3</h3>
                <div id="top-3" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>
        </div>

        <!-- TAB 1: CONTESTANTS -->
        <div id="content-1" class="tab-content hidden">
            <div class="flex justify-between items-center mt-8 mb-6">
                <h2 class="text-3xl font-semibold">Contestants</h2>
                <div class="flex gap-3">
                    <input id="new-contestant-name" type="text" 
                           class="bg-white/10 border border-white/20 focus:border-[#6f42c1] rounded-2xl px-6 py-4 w-80 outline-none text-white placeholder:text-gray-400"
                           placeholder="Enter contestant name (e.g. Maria Lopez)">
                    <button onclick="addContestant()" 
                            class="bg-[#6f42c1] hover:bg-[#8e5cff] px-8 py-4 rounded-2xl font-medium flex items-center gap-x-2">
                        <i class="fa-solid fa-plus"></i> Add Contestant
                    </button>
                </div>
            </div>
            
            <div id="contestants-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- TAB 2: JUDGES -->
        <div id="content-2" class="tab-content hidden">
            <div class="flex justify-between items-center mt-8 mb-6">
                <h2 class="text-3xl font-semibold">Judges</h2>
                <div class="flex gap-3">
                    <input id="new-judge-name" type="text" 
                           class="bg-white/10 border border-white/20 focus:border-[#6f42c1] rounded-2xl px-6 py-4 w-80 outline-none text-white placeholder:text-gray-400"
                           placeholder="Judge name">
                    <button onclick="addJudge()" 
                            class="bg-[#6f42c1] hover:bg-[#8e5cff] px-8 py-4 rounded-2xl font-medium flex items-center gap-x-2">
                        <i class="fa-solid fa-plus"></i> Add Judge
                    </button>
                </div>
            </div>
            
            <div id="judges-list" class="space-y-4"></div>
        </div>

        <!-- TAB 3: CRITERIA -->
        <div id="content-3" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mt-8 mb-8">Scoring Criteria &amp; Weights</h2>
            
            <div class="bg-white/5 border border-white/10 rounded-3xl p-8">
                <div id="criteria-list" class="space-y-8"></div>
                
                <div class="mt-10 pt-8 border-t border-white/10 flex gap-4">
                    <input id="new-criterion-name" type="text" placeholder="New criterion name" 
                           class="flex-1 bg-white/10 border border-white/20 rounded-2xl px-6 py-4 outline-none">
                    <input id="new-criterion-weight" type="number" value="20" placeholder="Weight %" 
                           class="w-32 bg-white/10 border border-white/20 rounded-2xl px-6 py-4 outline-none text-center">
                    <button onclick="addCriterion()" 
                            class="bg-[#6f42c1] hover:bg-[#8e5cff] px-8 rounded-2xl font-medium">Add Criterion</button>
                </div>
            </div>
            
            <div class="mt-6 text-center text-sm text-gray-400">
                Total weight must equal <span id="total-weight" class="font-bold text-[#facc15]">100</span>%
            </div>
        </div>

        <!-- TAB 4: SCORE ENTRY -->
        <div id="content-4" class="tab-content hidden">
            <div class="mt-8 flex gap-6">
                <div class="flex-1">
                    <label class="block text-sm font-medium mb-3">Select Judge</label>
                    <select id="score-judge" onchange="renderScoreTable()" 
                            class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-5 text-white outline-none">
                    </select>
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium mb-3">Select Contestant</label>
                    <select id="score-contestant" onchange="renderScoreTable()" 
                            class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-5 text-white outline-none">
                    </select>
                </div>
            </div>
            
            <div id="score-table-container" class="mt-8 glass border border-white/10 rounded-3xl p-8">
                <!-- Dynamically filled by JS -->
            </div>
            
            <div class="flex justify-end mt-6">
                <button onclick="saveCurrentScores()" 
                        class="bg-gradient-to-r from-[#6f42c1] to-[#c026d3] px-10 py-6 rounded-3xl text-xl font-semibold flex items-center gap-x-3 shadow-2xl shadow-purple-600/40">
                    <i class="fa-solid fa-floppy-disk"></i>
                    SAVE SCORES FOR THIS JUDGE &amp; CONTESTANT
                </button>
            </div>
        </div>

        <!-- TAB 5: LEADERBOARD -->
        <div id="content-5" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mt-8 mb-8 flex items-center gap-x-3">
                <i class="fa-solid fa-trophy"></i> Final Leaderboard
            </h2>
            
            <div id="leaderboard" class="space-y-3"></div>
            
            <div class="mt-12 flex justify-center gap-6">
                <button onclick="exportCSV()" 
                        class="flex items-center gap-x-3 bg-white text-[#1e2937] px-8 py-4 rounded-3xl font-semibold text-lg">
                    <i class="fa-solid fa-file-csv"></i> Download CSV
                </button>
                <button onclick="printLeaderboard()" 
                        class="flex items-center gap-x-3 border border-white/30 px-8 py-4 rounded-3xl font-semibold text-lg">
                    <i class="fa-solid fa-print"></i> Print Results
                </button>
            </div>
        </div>
    </div>

    <script>
        // Tailwind script initialization
        function initTailwind() {
            tailwind.config = {
                content: [],
                theme: {
                    extend: {}
                }
            }
        }
        
        // Global data
        let contestants = [
            { id: 1, name: "Maria Santos", number: 1 },
            { id: 2, name: "Isabella Cruz", number: 2 },
            { id: 3, name: "Sophia Reyes", number: 3 },
            { id: 4, name: "Emma Morales", number: 4 }
        ]
        
        let judges = [
            { id: 1, name: "Judge Carla Lopez" },
            { id: 2, name: "Judge Michael Tan" },
            { id: 3, name: "Judge Anna Garcia" }
        ]
        
        let criteria = [
            { name: "Interview & Personality", weight: 25 },
            { name: "Swimsuit & Fitness", weight: 20 },
            { name: "Evening Gown & Elegance", weight: 25 },
            { name: "Talent Performance", weight: 20 },
            { name: "On-Stage Question", weight: 10 }
        ]
        
        // Scores stored as: judgeId-contestantId-criterionName → score
        let scores = {}
        
        function saveToLocalStorage() {
            localStorage.setItem('pageant_contestants', JSON.stringify(contestants))
            localStorage.setItem('pageant_judges', JSON.stringify(judges))
            localStorage.setItem('pageant_criteria', JSON.stringify(criteria))
            localStorage.setItem('pageant_scores', JSON.stringify(scores))
        }
        
        function loadFromLocalStorage() {
            const savedContestants = localStorage.getItem('pageant_contestants')
            if (savedContestants) contestants = JSON.parse(savedContestants)
            
            const savedJudges = localStorage.getItem('pageant_judges')
            if (savedJudges) judges = JSON.parse(savedJudges)
            
            const savedCriteria = localStorage.getItem('pageant_criteria')
            if (savedCriteria) criteria = JSON.parse(savedCriteria)
            
            const savedScores = localStorage.getItem('pageant_scores')
            if (savedScores) scores = JSON.parse(savedScores)
        }
        
        function calculateTotalWeight() {
            return criteria.reduce((sum, c) => sum + c.weight, 0)
        }
        
        function renderDashboard() {
            document.getElementById('dash-contestants').textContent = contestants.length
            document.getElementById('dash-judges').textContent = judges.length
            document.getElementById('dash-ranked').textContent = contestants.length
            
            // Top 3
            const topContainer = document.getElementById('top-3')
            topContainer.innerHTML = ''
            
            const ranked = getRankings().slice(0, 3)
            
            ranked.forEach((entry, i) => {
                const div = document.createElement('div')
                div.className = `glass border border-white/10 rounded-3xl p-6 flex flex-col items-center ${i === 0 ? 'ring-4 ring-[#facc15]' : ''}`
                div.innerHTML = `
                    <div class="text-6xl mb-4">${i === 0 ? '👑' : i === 1 ? '🥈' : '🥉'}</div>
                    <div class="text-3xl font-bold text-center">${entry.name}</div>
                    <div class="text-[#facc15] text-5xl font-bold mt-3">${entry.total.toFixed(1)}</div>
                    <div class="text-sm text-gray-400">Total Score</div>
                `
                topContainer.appendChild(div)
            })
            
            if (ranked.length === 0) {
                topContainer.innerHTML = `<div class="col-span-3 text-center py-12 text-gray-400">No scores entered yet.<br>Start scoring in the Score Entry tab!</div>`
            }
        }
        
        function renderContestants() {
            const container = document.getElementById('contestants-grid')
            container.innerHTML = ''
            
            contestants.forEach(contestant => {
                const div = document.createElement('div')
                div.className = "glass border border-white/10 rounded-3xl p-6 flex justify-between items-center group"
                div.innerHTML = `
                    <div>
                        <div class="text-xs font-medium text-[#facc15]">#${contestant.number}</div>
                        <div class="text-2xl font-semibold">${contestant.name}</div>
                    </div>
                    <button onclick="deleteContestant(${contestant.id}); event.stopImmediatePropagation()" 
                            class="opacity-0 group-hover:opacity-100 bg-red-500/20 hover:bg-red-500/30 text-red-400 px-5 py-2 rounded-2xl text-sm">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `
                container.appendChild(div)
            })
            
            if (contestants.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-16 text-gray-400">No contestants yet. Add some above!</div>`
            }
        }
        
        function renderJudges() {
            const container = document.getElementById('judges-list')
            container.innerHTML = ''
            
            judges.forEach(judge => {
                const div = document.createElement('div')
                div.className = "glass border border-white/10 rounded-3xl px-8 py-5 flex justify-between items-center"
                div.innerHTML = `
                    <div class="flex items-center gap-x-4">
                        <div class="w-9 h-9 bg-[#6f42c1]/20 rounded-2xl flex items-center justify-center text-[#6f42c1] text-xl">👩‍⚖️</div>
                        <div class="text-xl">${judge.name}</div>
                    </div>
                    <button onclick="deleteJudge(${judge.id}); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-300">
                        <i class="fa-solid fa-circle-xmark text-2xl"></i>
                    </button>
                `
                container.appendChild(div)
            })
        }
        
        function renderCriteria() {
            const container = document.getElementById('criteria-list')
            container.innerHTML = ''
            
            criteria.forEach((crit, index) => {
                const div = document.createElement('div')
                div.className = "flex items-center justify-between"
                div.innerHTML = `
                    <div class="flex-1">
                        <span class="font-medium text-lg">${crit.name}</span>
                    </div>
                    <div class="flex items-center gap-x-8">
                        <div class="flex items-center">
                            <input type="range" min="5" max="40" value="${crit.weight}" 
                                   oninput="updateCriterionWeight(${index}, this.value)" class="score-input w-36">
                            <span class="ml-4 font-mono w-10 text-right">${crit.weight}%</span>
                        </div>
                        <button onclick="deleteCriterion(${index})" class="text-red-400 hover:text-red-300 px-4">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `
                container.appendChild(div)
            })
            
            document.getElementById('total-weight').textContent = calculateTotalWeight()
        }
        
        function updateCriterionWeight(index, newWeight) {
            criteria[index].weight = parseInt(newWeight)
            renderCriteria()
        }
        
        function renderScoreTable() {
            const judgeSelect = document.getElementById('score-judge')
            const contestantSelect = document.getElementById('score-contestant')
            
            const selectedJudgeId = parseInt(judgeSelect.value)
            const selectedContestantId = parseInt(contestantSelect.value)
            
            if (!selectedJudgeId || !selectedContestantId) return
            
            const container = document.getElementById('score-table-container')
            
            let html = `<div class="mb-6 text-lg font-medium">Scoring for <span class="text-[#facc15]">${contestants.find(c => c.id === selectedContestantId).name}</span> by <span class="text-[#facc15]">${judges.find(j => j.id === selectedJudgeId).name}</span></div>`
            
            html += `<div class="grid grid-cols-1 gap-8">`
            
            criteria.forEach(crit => {
                const key = `${selectedJudgeId}-${selectedContestantId}-${crit.name}`
                const currentScore = scores[key] || 85
                
                html += `
                <div>
                    <div class="flex justify-between text-sm mb-2 font-medium">
                        <span>${crit.name}</span>
                        <span class="text-[#facc15]">${currentScore} / 100</span>
                    </div>
                    <input type="range" min="0" max="100" value="${currentScore}" step="0.5"
                           data-key="${key}"
                           class="score-input w-full">
                </div>`
            })
            
            html += `</div>`
            
            container.innerHTML = html
            
            // Attach listeners to sliders
            container.querySelectorAll('input[type="range"]').forEach(slider => {
                slider.addEventListener('input', function() {
                    const key = this.dataset.key
                    scores[key] = parseFloat(this.value)
                })
            })
        }
        
        function saveCurrentScores() {
            const judgeSelect = document.getElementById('score-judge')
            const contestantSelect = document.getElementById('score-contestant')
            
            if (!judgeSelect.value || !contestantSelect.value) {
                alert("Please select a judge and contestant")
                return
            }
            
            // Scores already saved to global 'scores' object via sliders
            saveToLocalStorage()
            alert("✅ Scores saved successfully!")
            renderLeaderboard()
        }
        
        function populateSelects() {
            // Judge select
            const judgeSelect = document.getElementById('score-judge')
            judgeSelect.innerHTML = `<option value="">— Choose Judge —</option>`
            judges.forEach(j => {
                const opt = document.createElement('option')
                opt.value = j.id
                opt.textContent = j.name
                judgeSelect.appendChild(opt)
            })
            
            // Contestant select
            const contSelect = document.getElementById('score-contestant')
            contSelect.innerHTML = `<option value="">— Choose Contestant —</option>`
            contestants.forEach(c => {
                const opt = document.createElement('option')
                opt.value = c.id
                opt.textContent = `#${c.number} ${c.name}`
                contSelect.appendChild(opt)
            })
        }
        
        function getRankings() {
            const totals = {}
            
            contestants.forEach(contestant => {
                let totalScore = 0
                let weightSum = 0
                
                criteria.forEach(crit => {
                    let judgeScoresForThisCrit = 0
                    let judgeCount = 0
                    
                    judges.forEach(judge => {
                        const key = `${judge.id}-${contestant.id}-${crit.name}`
                        if (scores[key] !== undefined) {
                            judgeScoresForThisCrit += scores[key]
                            judgeCount++
                        }
                    })
                    
                    if (judgeCount > 0) {
                        const avg = judgeScoresForThisCrit / judgeCount
                        totalScore += avg * (crit.weight / 100)
                        weightSum += crit.weight
                    }
                })
                
                totals[contestant.id] = weightSum > 0 ? totalScore : 0
            })
            
            return contestants
                .map(c => ({
                    id: c.id,
                    name: c.name,
                    number: c.number,
                    total: totals[c.id] || 0
                }))
                .sort((a, b) => b.total - a.total)
        }
        
        function renderLeaderboard() {
            const container = document.getElementById('leaderboard')
            container.innerHTML = ''
            
            const rankedList = getRankings()
            
            rankedList.forEach((entry, index) => {
                const medal = index === 0 ? '👑' : index === 1 ? '🥈' : index === 2 ? '🥉' : '🏅'
                
                const div = document.createElement('div')
                div.className = `leaderboard-row glass border border-white/10 rounded-3xl px-8 py-6 flex items-center justify-between`
                div.innerHTML = `
                    <div class="flex items-center gap-x-8">
                        <div class="text-4xl">${medal}</div>
                        <div>
                            <div class="text-xs font-medium text-[#facc15]">#${entry.number}</div>
                            <div class="text-3xl font-semibold">${entry.name}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-6xl font-bold text-[#facc15]">${entry.total.toFixed(1)}</div>
                        <div class="text-xs uppercase tracking-widest text-gray-400">Total Score</div>
                    </div>
                `
                container.appendChild(div)
            })
            
            if (rankedList.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-gray-400">No scores yet. Enter some scores to see the live leaderboard!</div>`
            }
        }
        
        function switchTab(n) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'))
            // Show selected
            document.getElementById(`content-${n}`).classList.remove('hidden')
            
            // Update active tab buttons
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('tab-active'))
            document.getElementById(`tab-${n}`).classList.add('tab-active')
            
            // Refresh content for certain tabs
            if (n === 0) renderDashboard()
            if (n === 1) renderContestants()
            if (n === 2) renderJudges()
            if (n === 3) renderCriteria()
            if (n === 4) {
                populateSelects()
                renderScoreTable()
            }
            if (n === 5) renderLeaderboard()
        }
        
        // CRUD functions
        function addContestant() {
            const nameInput = document.getElementById('new-contestant-name')
            const name = nameInput.value.trim()
            if (!name) return
            
            const newId = contestants.length > 0 ? Math.max(...contestants.map(c => c.id)) + 1 : 1
            contestants.push({
                id: newId,
                name: name,
                number: contestants.length + 1
            })
            
            nameInput.value = ''
            saveToLocalStorage()
            renderContestants()
            renderDashboard()
        }
        
        function deleteContestant(id) {
            if (!confirm('Delete this contestant?')) return
            contestants = contestants.filter(c => c.id !== id)
            // Clean up scores
            Object.keys(scores).forEach(key => {
                if (key.includes(`-${id}-`)) delete scores[key]
            })
            saveToLocalStorage()
            renderContestants()
            renderDashboard()
            renderLeaderboard()
        }
        
        function addJudge() {
            const nameInput = document.getElementById('new-judge-name')
            const name = nameInput.value.trim()
            if (!name) return
            
            const newId = judges.length > 0 ? Math.max(...judges.map(j => j.id)) + 1 : 1
            judges.push({ id: newId, name: name })
            
            nameInput.value = ''
            saveToLocalStorage()
            renderJudges()
            renderDashboard()
        }
        
        function deleteJudge(id) {
            if (!confirm('Delete this judge?')) return
            judges = judges.filter(j => j.id !== id)
            // Clean up scores
            Object.keys(scores).forEach(key => {
                if (key.startsWith(`${id}-`)) delete scores[key]
            })
            saveToLocalStorage()
            renderJudges()
            renderDashboard()
            renderLeaderboard()
        }
        
        function addCriterion() {
            const nameInput = document.getElementById('new-criterion-name')
            const weightInput = document.getElementById('new-criterion-weight')
            
            const name = nameInput.value.trim()
            const weight = parseInt(weightInput.value)
            
            if (!name || !weight) return
            
            criteria.push({ name, weight })
            
            nameInput.value = ''
            weightInput.value = 20
            
            saveToLocalStorage()
            renderCriteria()
        }
        
        function deleteCriterion(index) {
            if (!confirm('Remove this criterion?')) return
            criteria.splice(index, 1)
            saveToLocalStorage()
            renderCriteria()
        }

        function exportData() {
            const data = {
                contestants: contestants,
                judges: judges,
                criteria: criteria,
                scores: scores,
                exportedAt: new Date().toISOString()
            }
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download = `pageant-scores-${new Date().toISOString().slice(0,10)}.json`
            a.click()
            URL.revokeObjectURL(url)
        }
        
        function exportCSV() {
            const ranked = getRankings()
            
            let csv = "Rank,Contestant Number,Name,Total Score\n"
            
            ranked.forEach((entry, i) => {
                csv += `${i+1},${entry.number},${entry.name},${entry.total.toFixed(2)}\n`
            })
            
            const blob = new Blob([csv], { type: 'text/csv' })
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download = 'pageant-leaderboard.csv'
            a.click()
            URL.revokeObjectURL(url)
        }
        
        function printLeaderboard() {
            const ranked = getRankings()
            let html = `<h1 style="text-align:center;font-family:Playfair Display,sans-serif">PAGEANT FINAL RANKINGS</h1><table style="width:100%;border-collapse:collapse;margin-top:30px">`
            
            html += `<tr style="background:#6f42c1;color:white"><th style="padding:12px;border:1px solid #ccc">Rank</th><th style="padding:12px;border:1px solid #ccc">No.</th><th style="padding:12px;border:1px solid #ccc">Contestant</th><th style="padding:12px;border:1px solid #ccc">Score</th></tr>`
            
            ranked.forEach((entry, i) => {
                html += `<tr><td style="padding:12px;border:1px solid #ccc;text-align:center">${i+1}</td><td style="padding:12px;border:1px solid #ccc;text-align:center">${entry.number}</td><td style="padding:12px;border:1px solid #ccc">${entry.name}</td><td style="padding:12px;border:1px solid #ccc;text-align:center">${entry.total.toFixed(1)}</td></tr>`
            })
            
            html += `</table>`
            
            const printWindow = window.open('', '_blank')
            printWindow.document.write(html)
            printWindow.document.close()
            printWindow.print()
        }
        
        function resetAllData() {
            if (!confirm("⚠️ Reset ALL data and start fresh?")) return
            
            contestants = []
            judges = []
            criteria = [
                { name: "Interview & Personality", weight: 25 },
                { name: "Swimsuit & Fitness", weight: 20 },
                { name: "Evening Gown & Elegance", weight: 25 },
                { name: "Talent Performance", weight: 20 },
                { name: "On-Stage Question", weight: 10 }
            ]
            scores = {}
            
            localStorage.clear()
            saveToLocalStorage()
            
            alert("✅ Everything has been reset!")
            renderDashboard()
            renderContestants()
            renderJudges()
            renderCriteria()
            renderLeaderboard()
            switchTab(0)
        }
        
        // Initialize the entire app
        function initializeApp() {
            initTailwind()
            loadFromLocalStorage()
            
            // Initial render of everything
            renderDashboard()
            renderContestants()
            renderJudges()
            renderCriteria()
            renderLeaderboard()
            
            // Show dashboard by default
            switchTab(0)
            
            console.log('%c✅ Full Pageant Scoring System ready! (Python-style logic in JS + Tailwind CSS)', 'color:#6f42c1;font-weight:bold')
        }
        
        // Start the app
        window.onload = initializeApp
    </script>
</body>
